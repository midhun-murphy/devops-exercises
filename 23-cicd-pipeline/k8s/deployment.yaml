apiVersion: apps/v1
kind: Deployment

metadata:
  name: calculator
  namespace: calculator

spec:
  replicas: 2

  selector:
    matchLabels:
      app: calculator

  template:
    metadata:
      labels:
        app: calculator

    spec:
      imagePullSecrets:
        - name: ecr-secret

      containers:
        - name: calculator
          image: 588681235754.dkr.ecr.ap-south-1.amazonaws.com/calculator:a9c1917a1166c50bae64d087457856da55d27616
          imagePullPolicy: Always
          ports:
            - containerPort: 5000