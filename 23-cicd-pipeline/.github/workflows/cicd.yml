name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "23-cicd-pipeline/**"

  pull_request:
    branches:
      - main
    paths:
      - "23-cicd-pipeline/**"

jobs:
  test-build:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 23-cicd-pipeline

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: |
          python -m pytest -v

      - name: Build Docker Image
        run: |
          docker build -t calculator-api:latest .