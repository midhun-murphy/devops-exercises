apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secret-store
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1

      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-secret
            key: access-key

          secretAccessKeySecretRef:
            name: aws-secret
            key: secret-access-key