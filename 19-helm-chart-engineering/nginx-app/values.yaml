replicaCount: 2

image:
  repository: nginx
  tag: "1.27"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

config:
  APP_NAME: nginx-app
  APP_ENV: dev

secret:
  USERNAME: admin
  PASSWORD: password123

ingress:
  enabled: false
  className: nginx
  host: nginx.local

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70