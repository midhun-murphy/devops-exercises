replicaCount: 3

image:
  repository: nginx
  tag: "1.27"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

config:
  APP_NAME: nginx-app
  APP_ENV: prod

secret:
  USERNAME: prodadmin
  PASSWORD: prod123

ingress:
  enabled: true
  className: nginx
  host: nginx.example.com

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70