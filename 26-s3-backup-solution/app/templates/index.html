<!DOCTYPE html>
<html>
<head>
    <title>Factorial </title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align:center;
            margin-top:100px;
        }

        input{
            padding:10px;
            width:200px;
        }

        button{
            padding:10px 20px;
            cursor:pointer;
        }

        .result{
            margin-top:20px;
            font-size:24px;
            font-weight:bold;
            color:green;
        }
    </style>
</head>

<body>

    <h1>Factorial Calculator</h1>

    <form method="POST">

        <input
            type="number"
    
            name="number"
            placeholder="Enter a number"
            required>

        <button type="submit">
            Calculate
        </button>

    </form>

    {% if answer is not none %}
        <div class="result">
            Factorial = {{ answer }}
        </div>
    {% endif %}

</body>
</html>
